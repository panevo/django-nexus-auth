[tool.ruff]
line-length = 88
target-version = "py310"
extend-exclude = ["tests/", "test_*.py", "*/tests/*"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501", # line too long – handled by the formatter
]

[tool.ruff.lint.isort]
known-first-party = ["nexus_auth"]